# XcodeGen spec for the ToneForge Mobile iOS app.
#
# The Swift package (Package.swift) at the repo root contains all the
# real code (ToneForgeEngine + ToneForgeMobile libraries + tests). This
# spec generates a minimal iOS app target that links the ToneForgeMobile
# library as a Swift Package dependency and provides the @main entry
# point + Info.plist + asset catalog.
#
# Usage:
#   brew install xcodegen
#   xcodegen generate            # produces ToneForgeMobile.xcodeproj
#   xcodebuild -project ToneForgeMobile.xcodeproj \
#              -scheme ToneForgeMobileApp \
#              -destination 'platform=iOS Simulator,name=iPhone 15' \
#              build

name: ToneForgeMobile
options:
  deploymentTarget:
    iOS: "17.0"
  bundleIdPrefix: com.toneforge
  createIntermediateGroups: true
  developmentLanguage: en

# Consume the SwiftPM package that lives alongside this file.
packages:
  ToneForgeMobilePackage:
    path: .

# Explicit scheme so `xcodebuild test -scheme ToneForgeMobileApp`
# runs the SwiftPM unit-test bundles plus the UI-test bundle on a
# simulator (the package's auto-generated schemes aren't
# test-configured when opened through this project).
schemes:
  ToneForgeMobileApp:
    build:
      targets:
        ToneForgeMobileApp: all
    test:
      targets:
        - package: ToneForgeMobilePackage/ToneForgeEngineTests
        - package: ToneForgeMobilePackage/ToneForgeMLTests
        - package: ToneForgeMobilePackage/ToneForgeMobileTests
        - ToneForgeMobileUITests

targets:
  ToneForgeMobileApp:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "Resources/Samples"
          - "Resources/DemoBundles"
      # The bundled sample packs must be added as folder references
      # (type: folder) so `Bundle.main.url(forResource: "Samples", …)`
      # resolves to a real directory inside the .app — otherwise
      # SampleBank.defaultBank can't find it and starter-pack triggers
      # go silent.
      - path: App/Resources/Samples
        type: folder
        buildPhase: resources
      # Pre-analyzed demo songs (PERFORM_PARITY spec 3.1). Same
      # folder-reference treatment so `Bundle.main.url(forResource:
      # "DemoBundles", …)` resolves to a real directory — BundleStore
      # .seedBundledDemos copies these into the local store on first
      # launch so the Library is never empty.
      - path: App/Resources/DemoBundles
        type: folder
        buildPhase: resources
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: ToneForge
        # Resolve from the version build settings (single source of
        # truth) so the Learn welcome screen reports real numbers. The
        # postBuildScript later overwrites CFBundleVersion with the git
        # commit count in the built product.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Modern launch screen (empty = plain system background).
        # Without a UILaunchScreen/UILaunchStoryboardName key iOS runs
        # the app letterboxed at legacy iPhone SE dimensions and
        # scales it — the "compressed layout" bug.
        UILaunchScreen: {}
        # Let the ModeGridView Canvas repaint at 120 Hz on ProMotion
        # displays (otherwise CADisplayLink-driven SwiftUI updates cap
        # at 60 Hz on iPhone).
        CADisableMinimumFrameDurationOnPhone: true
        # Music-library import: only unprotected, downloaded tracks
        # the user owns are analysable (DRM items are filtered out).
        NSAppleMusicUsageDescription: >-
          ToneForge lists your music library so you can analyse songs
          you own for practice. DRM-protected tracks are never uploaded.
        # P3 mic-as-pad-source pipeline: recordings become playable
        # pads. They are stored on-device only and never uploaded
        # (PadSampleMetadata.neverUpload, ComplianceTests).
        NSMicrophoneUsageDescription: >-
          ToneForge records short samples from the microphone so you
          can play them on the pads. Recordings stay on this device
          and are never uploaded.
        # Keep stems/practice audio playing when the app is backgrounded
        # or the screen locks mid-session.
        UIBackgroundModes: [audio]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Production traffic is HTTPS (https://jamn.app). The only ATS
        # exception is localhost for local backend development.
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
    dependencies:
      - package: ToneForgeMobilePackage
        product: ToneForgeMobile
      # ToneForgeML (Core ML drum classifier) — transitively pulled by
      # ToneForgeMobile, listed explicitly so the linker + resource bundle
      # are guaranteed into the app.
      - package: ToneForgeMobilePackage
        product: ToneForgeML
    # Sign in with Apple. Automatic signing (team below) adds the
    # capability to the App ID on first device build.
    # TEMP: disabled for free personal-team on-device build (free teams
    # cannot use the applesignin capability). Re-enable on a paid team.
    # entitlements:
    #   path: App/ToneForgeMobileApp.entitlements
    #   properties:
    #     com.apple.developer.applesignin: [Default]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.harvlad.toneforge.mobile
        # Version is a single source of truth: MARKETING_VERSION is the
        # human-facing semver; CURRENT_PROJECT_VERSION is a fallback build
        # number. App/Info.plist references both via $(...) so the Learn
        # welcome screen (JamWelcomeView.versionLine) shows the real
        # values. The postBuildScript below overwrites CFBundleVersion in
        # the built product with the git commit count so every build is
        # uniquely + monotonically tracked with zero manual bumping.
        MARKETING_VERSION: "0.9.0"
        CURRENT_PROJECT_VERSION: "244"
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        # Personal Team ID for on-device builds. If someone else clones
        # this repo they'll need to swap in their own team + a unique
        # bundle identifier.
        DEVELOPMENT_TEAM: H887LZYZ3M
    preBuildScripts:
      # Beat Capture (D-024): embed the latest published drum-classifier
      # model into the engine Resources before SwiftPM compiles it, so
      # every build ships the newest model. Best-effort — the script
      # keeps the committed baseline when the model server is
      # unreachable, so it never blocks a build.
      - name: Fetch latest Beat Capture model
        basedOnDependencyAnalysis: false
        script: |
          fetch="$SRCROOT/../scripts/fetch_beat_model.sh"
          [ -x "$fetch" ] && bash "$fetch" || true
    postBuildScripts:
      # Stamp the built product's CFBundleVersion with the git commit
      # count so the build number is realistic + auto-tracked. Falls back
      # to CURRENT_PROJECT_VERSION when git is unavailable (e.g. exported
      # source). Runs after the product is assembled so Bundle.main reads
      # the stamped value at runtime.
      - name: Stamp build number from git
        basedOnDependencyAnalysis: false
        script: |
          plist="$TARGET_BUILD_DIR/$INFOPLIST_PATH"
          [ -f "$plist" ] || exit 0
          build=$(git -C "$SRCROOT" rev-list --count HEAD 2>/dev/null)
          [ -n "$build" ] || build="$CURRENT_PROJECT_VERSION"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $build" "$plist"
          echo "Stamped CFBundleVersion = $build"

  # XCUITest bundle exercising the attestation gate through the app's
  # -uitest-* launch-argument contract (UITestSupport.swift).
  ToneForgeMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: ToneForgeMobileApp
    settings:
      base:
        TEST_TARGET_NAME: ToneForgeMobileApp
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: H887LZYZ3M
