# ToneForge nginx config
# Copy to /etc/nginx/sites-available/toneforge
# ln -s /etc/nginx/sites-available/toneforge /etc/nginx/sites-enabled/
# certbot --nginx -d jamn.app -d www.jamn.app

server {
    listen 80;
    server_name jamn.app www.jamn.app;

    # Max upload size (stems can be large)
    client_max_body_size 500M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed in future)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Longer timeout for analysis (demucs can take minutes)
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
    }
}
