# Beat Capture model — train + publish pipeline.
#
# Trains the CoreML drum classifier (synthetic corpus, optionally merged
# with exported real corrections), publishes the compiled .mlmodelc to
# the backend, and commits the refreshed baseline back to main so
# offline builds embed it too. Running clients pick the new model up on
# their next background update; every subsequent app build fetches it at
# build time.
#
# macOS-only: CreateML + coremlc require a full Xcode toolchain.
#
# Trigger: manual (workflow_dispatch). Training is heavy and publishing
# is a deliberate act, so it is never run automatically on push.
#
# Secrets required (Settings -> Secrets and variables -> Actions):
#   TONEFORGE_ENGINE_TOKEN   engine token accepted by POST /api/beat-model
#
# Variables (optional):
#   TONEFORGE_BASE_URL       backend base (default https://jamn.app)

name: beat-model-publish

on:
  workflow_dispatch:
    inputs:
      commit_baseline:
        description: "Commit the retrained baseline model back to main"
        type: boolean
        default: true
  schedule:
    # Weekly retrain from E-GMD + fresh corrections. Mon 06:00 UTC.
    - cron: "0 6 * * 1"

permissions:
  contents: write  # for committing the refreshed baseline model

jobs:
  train-publish:
    runs-on: macos-14  # Apple Silicon; CreateML needs full Xcode
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for the baseline commit + short sha
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Fetch correction corpus
        id: corpus
        env:
          TONEFORGE_ENGINE_TOKEN: ${{ secrets.TONEFORGE_ENGINE_TOKEN }}
          TONEFORGE_BASE_URL: ${{ vars.TONEFORGE_BASE_URL }}
        run: |
          set -uo pipefail  # best-effort: a missing corpus must not block training
          base="${TONEFORGE_BASE_URL:-https://jamn.app}"
          out="$RUNNER_TEMP/beat_corrections.csv"
          if curl -fsS -H "X-Engine-Token: ${TONEFORGE_ENGINE_TOKEN:-}" \
               "$base/api/beat-corrections/export" -o "$out"; then
            rows=$(($(wc -l < "$out") - 1))  # minus header
            echo "Fetched $rows correction row(s)"
            if [[ "$rows" -gt 0 ]]; then
              echo "path=$out" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "corpus export unavailable; training on synthetic corpus only"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Harvest E-GMD
        id: harvest
        env:
          # E-GMD is a ~96 GB zip streamed by HTTP range, so the limit
          # bounds the download. E-GMD is full-kit performance audio (every
          # slice carries bleed from adjacent drums) while inference sees
          # isolated pad taps, so real rows work as light seasoning over the
          # synthetic backbone — flooding the corpus with them drags holdout
          # below the gate. Keep both limits modest: rare roles stay
          # synthetic-dominated and the model clears --min-accuracy.
          EGMD_LIMIT: ${{ github.event_name == 'schedule' && '80' || '500' }}
          EGMD_CACHE_DIR: ${{ runner.temp }}/e-gmd
        run: |
          set -uo pipefail  # best-effort: dataset issues must not block training
          python3 -m pip install --quiet "pretty_midi>=0.2.10" "remotezip>=0.12.3"
          out="$RUNNER_TEMP/beat_harvest.csv"
          # Last stdout line is the harvest CSV path (only on success + rows>0).
          path="$(bash scripts/harvest_beat_dataset.sh "$out" --max-per-role 4000 | tail -n 1)"
          if [[ -n "$path" && -f "$path" ]]; then
            rows=$(($(wc -l < "$path") - 1))
            echo "Harvested $rows E-GMD row(s)"
            if [[ "$rows" -gt 0 ]]; then
              echo "path=$path" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "E-GMD unavailable; training without harvested rows"
          fi

      - name: Train model
        run: |
          set -euo pipefail
          args=()
          if [[ -n "${{ steps.corpus.outputs.path }}" ]]; then
            args+=(--corrections "${{ steps.corpus.outputs.path }}")
          fi
          if [[ -n "${{ steps.harvest.outputs.path }}" ]]; then
            args+=(--harvest "${{ steps.harvest.outputs.path }}")
          fi
          bash scripts/train_beat_model.sh "${args[@]+"${args[@]}"}"

      - name: Derive version
        id: ver
        run: |
          set -euo pipefail
          version="$(date -u +%Y.%m.%d)-$(git rev-parse --short HEAD)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Model version: $version"

      - name: Publish model
        env:
          TONEFORGE_ENGINE_TOKEN: ${{ secrets.TONEFORGE_ENGINE_TOKEN }}
          TONEFORGE_BASE_URL: ${{ vars.TONEFORGE_BASE_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${TONEFORGE_ENGINE_TOKEN:-}" ]]; then
            echo "::error::TONEFORGE_ENGINE_TOKEN is unset; cannot publish"
            exit 1
          fi
          bash scripts/publish_beat_model.sh "${{ steps.ver.outputs.version }}"

      - name: Commit refreshed baseline
        if: ${{ github.event_name == 'schedule' || inputs.commit_baseline }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile-ios/Sources/ToneForgeEngine/Resources/BeatClassifier.mlmodel \
                  mobile-ios/Sources/ToneForgeEngine/Resources/BeatClassifier.mlmodelc
          if git diff --cached --quiet; then
            echo "Baseline unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "beat-model: publish ${{ steps.ver.outputs.version }}"
          # Push to main so offline builds embed the newest baseline. If
          # main advanced during the run the push fails; re-run to retry.
          git push origin HEAD:main
