# Backend — lint + test gate.
#
# Runs on every push and PR that touches the Python backend. Two
# jobs:
#
#   lint: ruff with the retrofit gate configured in
#         backend/pyproject.toml (E9/F63/F7/F82 — syntax errors,
#         undefined names, comparison bugs). Fast fail before the
#         heavyweight test job.
#
#   test: full pytest suite. Installing requirements.txt is heavy
#         (torch/torchaudio/demucs), so pip's cache is keyed on the
#         requirements files and the timeout is generous.
#

name: backend-tests

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff (critical rules gate)
        run: ruff check tone_forge tone_forge_api.py local_engine tests cli.py

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests -q
